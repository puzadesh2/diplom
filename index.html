<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Фотографии</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="page">
        <div class="wrapper" style="background-color: antiquewhite">
            <div class="photo-stage">
                <img src="images/test21.png" alt="" class="photo-bg" />
                <div class="photo-lottie" id="mermaid-lottie" aria-hidden="true"></div>
                <div class="photo-static-text" aria-hidden="true">
                    <div class="photo-static-line">Там чудеса: там леший бродит,</div>
                    <div class="photo-static-line">Русалка на ветвях сидит;</div>
                </div>
            </div>
            <div class="intro-inner" style="background-color:#c22525;">
                <div class="lines-container" style="background-color: aquamarine">
                    <div class="lines">
                        <!-- строки добавляются динамически через JS -->
                    </div>
                </div>
            </div>
        </div>
        <div class="wrapper">
            <div class="slide-photo-wrap">
                <img src="images/test14.png" alt="" class="photo" />
                <div class="photo-static-text photo-static-text--upper" aria-hidden="true">
                    <div class="photo-static-line">Избушка там на курьих ножках</div>
                    <div class="photo-static-line">Стоит без окон, без дверей;</div>
                </div>
                <div class="photo-static-text photo-static-text--lower" aria-hidden="true">
                    <div class="photo-static-line">Там на неведомых дорожках</div>
                    <div class="photo-static-line">Следы невиданных зверей;</div>
                </div>
                <img src="images/paw1.PNG" alt="" class="bear-paw-print" width="140" height="140" aria-hidden="true" />
            </div>
        </div>
        <div class="wrapper">
            <img src="images/test9.png" alt="" class="photo" />
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
